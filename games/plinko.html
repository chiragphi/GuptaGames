<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plinko — LuckyDev Casino</title>
<link rel="stylesheet" href="../css/main.css"/>
<link rel="stylesheet" href="../css/games.css"/>
<link rel="stylesheet" href="../css/animations.css"/>
</head>
<body>
<div style="display:none" id="svg-sprite-container"></div>
<script>fetch('../assets/icons/sprite.svg').then(r=>r.text()).then(t=>{document.getElementById('svg-sprite-container').innerHTML=t;});</script>
<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal-content"></div></div>
<div id="toast-container"></div>
<div id="bonus-popup">
  <div class="bonus-popup-title">Free Bonus!</div>
  <div class="bonus-popup-amount">+100 CHIPS</div>
  <div style="display:flex;gap:10px;justify-content:center;margin-top:16px">
    <button class="btn btn-gold" onclick="claimBonusPopup()">Claim!</button>
    <button class="btn btn-ghost btn-sm" onclick="dismissBonusPopup()">Dismiss</button>
  </div>
</div>
<div id="jackpot-overlay">
  <div style="display:flex;flex-direction:column;align-items:center;gap:20px">
    <div class="jackpot-title">JACKPOT!!!</div>
    <div class="jackpot-amount">+0 CHIPS</div>
    <button class="btn btn-gold btn-lg" onclick="document.getElementById('jackpot-overlay').classList.remove('active')">Collect!</button>
  </div>
</div>

<header class="site-header">
  <a href="../index.html" class="header-logo">
    <svg class="icon" aria-hidden="true"><use href="#icon-crown"/></svg>LuckyDev Casino
  </a>
  <nav class="header-nav">
    <a href="../index.html"><svg class="icon" aria-hidden="true"><use href="#icon-home"/></svg>Lobby</a>
  </nav>
  <div class="header-right">
    <div class="xp-bar-mini">
      <div class="level-label" id="xp-level-label">Lv.1</div>
      <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    </div>
    <div class="balance-display" id="balance-display">
      <svg class="icon" aria-hidden="true"><use href="#icon-coin"/></svg>
      <span class="balance-amount" id="balance-amount">0</span>
    </div>
    <button class="btn-icon" id="mute-btn">
      <svg class="icon" aria-hidden="true"><use href="#icon-volume"/></svg>
    </button>
  </div>
</header>

<div class="game-page">
<div class="game-area">
  <div class="game-title">Plinko</div>
  <div class="game-subtitle">Drop balls through pegs — land in high-value buckets — up to 1000x!</div>

  <div class="plinko-container">
    <canvas id="plinko-canvas" style="background:#060610;border-radius:12px;border:2px solid var(--border)"></canvas>

    <div class="plinko-controls">
      <div>
        <div style="font-size:0.75rem;color:var(--text-sec);margin-bottom:4px">Risk</div>
        <div class="risk-selector">
          <button class="risk-btn low" data-risk="low">Low</button>
          <button class="risk-btn med" data-risk="med">Med</button>
          <button class="risk-btn high" data-risk="high">High</button>
        </div>
      </div>

      <div>
        <div style="font-size:0.75rem;color:var(--text-sec);margin-bottom:4px">Bet per ball</div>
        <input type="number" id="plinko-bet" class="bet-input" value="10" min="1"/>
      </div>

      <div>
        <div style="font-size:0.75rem;color:var(--text-sec);margin-bottom:4px">Balls</div>
        <select id="ball-count" class="bet-input" style="width:80px">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="5">5</option>
        </select>
      </div>

      <div>
        <div style="font-size:0.75rem;color:transparent;margin-bottom:4px">.</div>
        <button class="btn btn-gold" id="plinko-drop">DROP</button>
      </div>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
      <button class="btn-bet plinko-quick" data-val="1">1</button>
      <button class="btn-bet plinko-quick" data-val="10">10</button>
      <button class="btn-bet plinko-quick" data-val="50">50</button>
      <button class="btn-bet plinko-quick" data-val="100">100</button>
      <button class="btn-bet plinko-quick" data-val="250">250</button>
    </div>
  </div>
</div>
</div>

<footer class="site-footer">
  <div class="footer-disclaimer">For entertainment only — no real money involved.</div>
</footer>

<script src="../js/core.js"></script>
<script src="../js/addiction.js"></script>
<script src="../js/audio.js"></script>
<script src="../js/particles.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/games/plinko.js"></script>
<script>
(async () => {
  Core.init();
  Particles.init();
  Core.setBalanceEl(document.getElementById('balance-display'));
  Core.setXPEls(document.getElementById('xp-fill'), document.getElementById('xp-level-label'));
  Core.updateBalanceUI(0, Core.getBalance());
  Core.updateXPBar();
  Audio.wireButtonSounds();
  Addiction.init();
  await FirebaseDB.init();
  Plinko.init();
  const muteBtn = document.getElementById('mute-btn');
  muteBtn?.addEventListener('click', () => {
    const icon = muteBtn.querySelector('use');
    const isMuted = icon.getAttribute('href') === '#icon-mute';
    Audio.setMuted(!isMuted);
    icon.setAttribute('href', isMuted ? '#icon-volume' : '#icon-mute');
  });
})();
</script>
</body>
</html>
