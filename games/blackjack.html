<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blackjack — LuckyDev Casino</title>
<link rel="stylesheet" href="../css/main.css"/>
<link rel="stylesheet" href="../css/games.css"/>
<link rel="stylesheet" href="../css/animations.css"/>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>
<div style="display:none" id="svg-sprite-container"></div>
<script>fetch('../assets/icons/sprite.svg').then(r=>r.text()).then(t=>{document.getElementById('svg-sprite-container').innerHTML=t;});</script>
<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal-content"></div></div>
<div id="toast-container"></div>
<div id="bonus-popup"><div class="bonus-popup-title">Free Bonus!</div><div class="bonus-popup-amount">+100 CHIPS</div><div style="display:flex;gap:10px;justify-content:center;margin-top:16px"><button class="btn btn-gold" onclick="claimBonusPopup()">Claim!</button><button class="btn btn-ghost btn-sm" onclick="dismissBonusPopup()">Dismiss</button></div></div>
<div id="jackpot-overlay"><div style="display:flex;flex-direction:column;align-items:center;gap:20px"><div class="jackpot-title">JACKPOT!!!</div><div class="jackpot-amount">+0 CHIPS</div><button class="btn btn-gold btn-lg" onclick="document.getElementById('jackpot-overlay').classList.remove('active')">Collect!</button></div></div>

<header class="site-header">
  <a href="../lobby.html" class="header-logo"><svg class="icon" aria-hidden="true"><use href="#icon-crown"/></svg>LuckyDev Casino</a>
  <nav class="header-nav"><a href="../lobby.html"><svg class="icon" aria-hidden="true"><use href="#icon-home"/></svg>Lobby</a></nav>
  <div class="header-right">
    <div class="xp-bar-mini"><div class="level-label" id="xp-level-label">Lv.1</div><div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div></div>
    <div class="balance-display" id="balance-display"><svg class="icon" aria-hidden="true"><use href="#icon-coin"/></svg><span class="balance-amount" id="balance-amount">0</span></div>
    <a href="../lobby.html" class="back-to-lobby-btn">
      <svg class="icon" aria-hidden="true"><use href="#icon-home"/></svg>
      Lobby
    </a>
    <button class="btn-icon" id="mute-btn"><svg class="icon" aria-hidden="true"><use href="#icon-volume"/></svg></button>
  </div>
</header>

<div class="game-page">
<div class="game-area">
  <div class="game-title">Blackjack</div>
  <div class="game-subtitle">6-Deck Shoe · Vegas Rules · Double Down · Split</div>

  <div class="blackjack-table">
    <!-- Dealer -->
    <div style="text-align:center;width:100%">
      <div style="font-size:0.75rem;color:rgba(255,255,255,0.5);margin-bottom:6px">DEALER</div>
      <div id="dealer-hand"></div>
      <div class="hand-value" id="dealer-hand-value" style="margin-top:8px">0</div>
    </div>

    <!-- Status -->
    <div class="game-result" id="bj-result" style="font-size:1.3rem"></div>

    <!-- Player -->
    <div style="text-align:center;width:100%">
      <div style="font-size:0.75rem;color:rgba(255,255,255,0.5);margin-bottom:6px">YOU</div>
      <div id="player-hand"></div>
      <div class="hand-value" id="player-hand-value" style="margin-top:8px">0</div>
    </div>
  </div>

  <!-- BET + ACTIONS -->
  <div class="bet-controls" style="max-width:700px;width:100%;margin-top:16px">
    <div class="bet-row">
      <span class="bet-label">Bet</span>
      <input type="number" id="bj-bet-input" class="bet-input" value="10" min="1"/>
      <div class="bet-quick">
        <button class="btn-bet bj-quick" data-val="5">5</button>
        <button class="btn-bet bj-quick" data-val="10">10</button>
        <button class="btn-bet bj-quick" data-val="25">25</button>
        <button class="btn-bet bj-quick" data-val="50">50</button>
        <button class="btn-bet bj-quick" data-val="100">100</button>
      </div>
    </div>
    <div class="bj-actions">
      <button class="btn btn-gold btn-lg" id="bj-bet">Deal</button>
      <button class="btn btn-green" id="bj-hit" disabled>Hit</button>
      <button class="btn btn-ghost" id="bj-stand" disabled>Stand</button>
      <button class="btn btn-ghost" id="bj-double" disabled>Double</button>
      <button class="btn btn-ghost" id="bj-split" disabled>Split</button>
    </div>
  </div>

  <!-- STATUS -->
  <div style="text-align:center;min-height:24px;font-size:0.9rem;color:var(--text-sec);margin-top:8px" id="bj-status"></div>

</div>
</div>

<footer class="site-footer">
  <div class="footer-disclaimer">For entertainment only — no real money involved.</div>
</footer>

<script src="../js/core.js"></script>
<script src="../js/addiction.js"></script>
<script src="../js/audio.js"></script>
<script src="../js/particles.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/games/blackjack.js"></script>
<script>
(async () => {
  Core.init(); Particles.init();
  Core.setBalanceEl(document.getElementById('balance-display'));
  Core.setXPEls(document.getElementById('xp-fill'), document.getElementById('xp-level-label'));
  Core.updateBalanceUI(0, Core.getBalance()); Core.updateXPBar();
  Audio.wireButtonSounds(); Addiction.init();
  await FirebaseDB.init();
  Blackjack.init();
  document.getElementById('mute-btn')?.addEventListener('click', () => {
    const icon = document.querySelector('#mute-btn use');
    const m = icon.getAttribute('href')==='#icon-mute';
    Audio.setMuted(!m); icon.setAttribute('href', m?'#icon-volume':'#icon-mute');
  });
})();
</script>
</body>
</html>
