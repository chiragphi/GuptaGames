<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dice — LuckyDev Casino</title>
<link rel="stylesheet" href="../css/main.css"/>
<link rel="stylesheet" href="../css/games.css"/>
<link rel="stylesheet" href="../css/animations.css"/>
</head>
<body>
<div style="display:none" id="svg-sprite-container"></div>
<script>fetch('../assets/icons/sprite.svg').then(r=>r.text()).then(t=>{document.getElementById('svg-sprite-container').innerHTML=t;});</script>
<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal-content"></div></div>
<div id="toast-container"></div>
<div id="bonus-popup"><div class="bonus-popup-title">Free Bonus!</div><div class="bonus-popup-amount">+100 CHIPS</div><div style="display:flex;gap:10px;justify-content:center;margin-top:16px"><button class="btn btn-gold" onclick="claimBonusPopup()">Claim!</button><button class="btn btn-ghost btn-sm" onclick="dismissBonusPopup()">Dismiss</button></div></div>
<div id="jackpot-overlay"><div style="display:flex;flex-direction:column;align-items:center;gap:20px"><div class="jackpot-title">JACKPOT!!!</div><div class="jackpot-amount">+0 CHIPS</div><button class="btn btn-gold btn-lg" onclick="document.getElementById('jackpot-overlay').classList.remove('active')">Collect!</button></div></div>

<header class="site-header">
  <a href="../index.html" class="header-logo"><svg class="icon" aria-hidden="true"><use href="#icon-crown"/></svg>LuckyDev Casino</a>
  <nav class="header-nav"><a href="../index.html"><svg class="icon" aria-hidden="true"><use href="#icon-home"/></svg>Lobby</a></nav>
  <div class="header-right">
    <div class="xp-bar-mini"><div class="level-label" id="xp-level-label">Lv.1</div><div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div></div>
    <div class="balance-display" id="balance-display"><svg class="icon" aria-hidden="true"><use href="#icon-coin"/></svg><span class="balance-amount" id="balance-amount">0</span></div>
    <button class="btn-icon" id="mute-btn"><svg class="icon" aria-hidden="true"><use href="#icon-volume"/></svg></button>
  </div>
</header>

<div class="game-page">
<div class="game-area">
  <div class="game-title">Dice</div>
  <div class="game-subtitle">Roll over or under your target — adjust win chance — press Space to roll</div>

  <div class="dice-layout">

    <!-- Dice display -->
    <div class="dice-display">
      <div class="dice-face" id="dice-face-1">
        <svg class="icon" style="width:100%;height:100%;color:white" aria-hidden="true"><use href="#icon-dice-1"/></svg>
      </div>
      <div class="dice-result-num" id="dice-roll-result">—</div>
      <div class="dice-face" id="dice-face-2">
        <svg class="icon" style="width:100%;height:100%;color:white" aria-hidden="true"><use href="#icon-dice-1"/></svg>
      </div>
    </div>

    <!-- Result -->
    <div class="game-result" id="dice-result"></div>

    <!-- Over/Under -->
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn btn-ghost over-under-btn active" data-mode="over" style="flex:1">Roll Over <span id="dice-threshold">50</span></button>
      <button class="btn btn-ghost over-under-btn" data-mode="under" style="flex:1">Roll Under</button>
    </div>

    <!-- Win chance slider -->
    <div style="width:100%">
      <div style="display:flex;justify-content:space-between;font-size:0.78rem;color:var(--text-sec);margin-bottom:6px">
        <span>Win Chance</span>
        <span id="win-chance-val">50.00%</span>
      </div>
      <input type="range" id="win-chance-slider" class="win-chance-slider" min="1" max="95" step="0.01" value="50"/>
    </div>

    <!-- Stats -->
    <div class="dice-stats">
      <div class="dice-stat">
        <div class="dice-stat-label">Win Chance</div>
        <div class="dice-stat-val" id="dice-win-chance">50.00%</div>
      </div>
      <div class="dice-stat">
        <div class="dice-stat-label">Multiplier</div>
        <div class="dice-stat-val" id="dice-multiplier">1.9600x</div>
      </div>
      <div class="dice-stat">
        <div class="dice-stat-label">Profit on Win</div>
        <div class="dice-stat-val profit" id="dice-profit">9</div>
      </div>
    </div>

    <!-- Bet -->
    <div class="bet-controls" style="width:100%">
      <div class="bet-row">
        <span class="bet-label">Bet</span>
        <input type="number" id="dice-bet" class="bet-input" value="10" min="1"/>
        <div class="bet-quick">
          <button class="btn-bet dice-quick" data-val="1">1</button>
          <button class="btn-bet dice-quick" data-val="10">10</button>
          <button class="btn-bet dice-quick" data-val="50">50</button>
          <button class="btn-bet dice-quick" data-val="100">100</button>
        </div>
      </div>
    </div>

    <button class="btn btn-gold btn-lg" id="dice-roll-btn" style="width:100%;max-width:300px">
      <svg class="icon" aria-hidden="true"><use href="#icon-dice-5"/></svg>
      Roll (Space)
    </button>

  </div>
</div>
</div>

<footer class="site-footer">
  <div class="footer-disclaimer">For entertainment only — no real money involved.</div>
</footer>

<script src="../js/core.js"></script>
<script src="../js/addiction.js"></script>
<script src="../js/audio.js"></script>
<script src="../js/particles.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/games/dice.js"></script>
<script>
(async () => {
  Core.init(); Particles.init();
  Core.setBalanceEl(document.getElementById('balance-display'));
  Core.setXPEls(document.getElementById('xp-fill'), document.getElementById('xp-level-label'));
  Core.updateBalanceUI(0, Core.getBalance()); Core.updateXPBar();
  Audio.wireButtonSounds(); Addiction.init();
  await FirebaseDB.init();
  Dice.init();
  document.getElementById('mute-btn')?.addEventListener('click', () => {
    const icon = document.querySelector('#mute-btn use');
    const m = icon.getAttribute('href')==='#icon-mute';
    Audio.setMuted(!m); icon.setAttribute('href', m?'#icon-volume':'#icon-mute');
  });
  // active style for over/under
  document.querySelectorAll('.over-under-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.over-under-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
})();
</script>
</body>
</html>
